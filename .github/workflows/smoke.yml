name: Live API smoke test

# The public datasets this server depends on occasionally move or change
# schema; this weekly run catches upstream breakage early.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run smoke
